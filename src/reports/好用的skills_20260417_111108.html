<!DOCTYPE html>

        }

            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .news-stats {

            margin: 10px 0;

        }
        .news-stat {

            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #666;
        }
        .news-stat-value {
            font-weight: bold;

        }
        .news-summary {

            color: #666;
            margin-bottom: 10px;
        }
        .news-comment {
            background: #f8f9fa;
            padding: 10px;
            margin: 8px 0;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            border-left: 3px solid #ff2442;
        }
        .highlight-list { margin: 10px 0; padding-left: 18px; }
